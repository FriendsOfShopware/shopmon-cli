version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: shopmon-cli
    binary: shopmon-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
    dir: .

archives:
  - ids:
      - shopmon-cli
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

dockers_v2:
  - id: shopmon-cli
    ids:
      - shopmon-cli
    dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/friendsofshopware/shopmon-cli"
    tags:
      - "{{ .Tag }}"
    platforms:
      - linux/amd64
      - linux/arm64

changelog:
  sort: desc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: friendsofshopware
    name: shopmon-cli
